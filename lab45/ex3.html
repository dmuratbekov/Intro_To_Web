<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Lab 3 - Joke</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Lab 3: Random Joke</h1>
        <button onclick="getJoke()">Get Joke</button>
        <p id="jokeText">Click the button to load a joke.</p>
    </div>
    <script>
        async function getJoke() {
            const p = document.getElementById("jokeText");
            p.textContent = "Loading...";

            try {
                const res = await fetch("https://official-joke-api.appspot.com/random_joke");
                const joke = await res.json();
                p.textContent = `${joke.setup} — ${joke.punchline}`;
            } catch (err) {
                console.error(err);
                p.textContent = "Error loading joke";
            }
        }
    </script>
</body>

</html>
