<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Lab 4 - Search Users</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body onload="loadUsersForSearch()">
    <div class="container">
        <h1>Lab 4: Search Users</h1>
        <input id="searchInput" type="text" placeholder="Type name..." oninput="filterUsers()">
        <ul id="searchList"></ul>
    </div>

    <script>
        let allUsers = [];

        async function loadUsersForSearch() {
            const ul = document.getElementById("searchList");
            ul.innerHTML = "Loading...";

            try {
                const res = await fetch("https://jsonplaceholder.typicode.com/users");
                allUsers = await res.json();
                renderSearchList(allUsers);
            } catch (err) {
                console.error(err);
                ul.innerHTML = "Error loading users";
            }
        }

        function renderSearchList(users) {
            const ul = document.getElementById("searchList");
            ul.innerHTML = "";
            users.forEach(u => {
                const li = document.createElement("li");
                li.textContent = u.name;
                ul.appendChild(li);
            });
        }

        function filterUsers() {
            const input = document.getElementById("searchInput").value.toLowerCase();
            const filtered = allUsers.filter(u => u.name.toLowerCase().includes(input));
            renderSearchList(filtered);
        }
    </script>
</body>

</html>
