<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Shadow</title>
    <style>
        body {
            background-color: #222;
        }

        h1 {
            color: #fff;
            font-size: 100px;
            text-shadow: 0px 0px 30px rgb(52, 246, 172);
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>Text with Shadow</h1>
</body>

</html>
