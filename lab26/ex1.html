<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Font Example</title>
    <style>
        .title {
            font-family: Arial, sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .text {
            font-family: 'Courier New', monospace;
            font-size: 16px;
            font-weight: 500;
            color: #666;
        }
    </style>
</head>

<body>

    <h1 class="title">CSS Font Example</h1>
    <p class="text">This is a paragraph with custom font settings.</p>

</body>

</html>
